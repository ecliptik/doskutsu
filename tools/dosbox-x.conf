# dosbox-x.conf — parity profile for DOSKUTSU
#
# Approximates the Gateway 2000 Pentium OverDrive 83 MHz ("g2k") target:
#   CPU:    Pentium (P54C, no MMX) at ~Pentium-40 class integer throughput
#   RAM:    48 MB
#   Video:  VESA 1.2+ SVGA linear framebuffer (Cave Story renders 320x240)
#   Sound:  SB16 on IRQ 5 / DMA 1/5 / base 220 (matches Vibra16S in g2k)
#
# cycles=fixed 40000 is the PLAN.md-specified starting point for PODP83
# Pentium-40-class integer perf. Re-calibrate with a reference benchmark
# once Phase 7 playtest produces a measurable target.
#
# Use this config for: Phase 7 playtest gate, audio-dropout investigation,
# anything where real-HW-equivalent timing matters.
#
# For fast iteration (cycles=max), use tools/dosbox-x-fast.conf instead.

[sdl]
# tools/dosbox-launch.sh brings this up visible on DISPLAY=:0.
# tools/dosbox-run.sh uses `dosbox-x -silent -exit` (no window).
fullscreen = false
output     = surface

[dosbox]
# svga_s3 — VESA 1.2+ linear framebuffer, what SDL3-DOS expects.
# (`vgaonly` would work for a text-mode smoke test but not for the real
# 320x240 VESA path.)
machine    = svga_s3
# 48 MB matches the g2k build — same headroom we have on real hardware.
memsize    = 48
# Suppress the "really quit?" modal — it blocks pkill/SIGTERM and wedges
# automated runners behind a dialog that cannot be answered without X input.
quit warning = false

[cpu]
# P54C Pentium, no MMX. DOSBox-X's `pentium_slow` tracks P5 FPU + no MMX
# and schedules more like the short P5 pipeline than `pentium`.
cputype    = pentium_slow
# `normal` core for deterministic timing. Dynamic core reorders in ways
# that can mask audio-DMA edge cases we care about.
core       = normal
# PODP83 Pentium-40-class integer throughput. See PLAN.md Phase 7.
cycles     = fixed 40000

[sblaster]
# Matches the `[VIBRA]` profile on g2k: SB16 / IRQ 5 / DMA 1 / HDMA 5 / base 220.
# SDL3-DOS reads the `BLASTER` env var; this config sets the hardware side
# to match so the env var `A220 I5 D1 H5 T6` Just Works.
sbtype     = sb16
sbbase     = 220
irq        = 5
dma        = 1
hdma       = 5
# Disable OPL — Cave Story doesn't use FM. Reduces emulated chip count.
oplmode    = none

[vesa]
# `compatible` mode list — VESA 1.2+ with linear framebuffer, which is what
# SDL3-DOS probes for. Avoids exotic modes we don't support anyway.
modelist   = compatible

[dos]
# DJGPP uses DPMI (via CWSDPMI); NOEMS on real hardware. Under DOSBox-X we
# leave XMS/EMS/UMB on to avoid tripping any subsystem that might check.
xms        = true
ems        = true
umb        = true

[render]
# No aspect correction, no scaler — we want unmodified framebuffer-out for
# screenshots and timing honesty.
aspect     = false
scaler     = none

[autoexec]
# Mount + exe invocation are injected by dosbox-launch.sh / dosbox-run.sh via
# -c flags so this config stays invocation-agnostic for those code paths.
#
# The single SET below is defense-in-depth: it fires for any direct
# `dosbox-x -conf tools/dosbox-x.conf` invocation that bypasses the launchers.
# DOSBox-X's emulated SB16 returns 0xFF on the DSP detection read regardless
# of timing tuning, so SDL3-DOS audio init fails without this env var (see
# patches/SDL/0001-sb16-dsp-detection-fix.patch fix #4 — the escape hatch).
# Real hardware (g2k Phase 8) MUST NOT set this — its own dosbox config is
# irrelevant there, but if anyone copies this conf for HW use, strip the SET.
SET SDL_DOS_AUDIO_SB_SKIP_DETECTION=1
