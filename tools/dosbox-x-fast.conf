# dosbox-x-fast.conf — fast-iteration profile for DOSKUTSU
#
# Identical to tools/dosbox-x.conf except cycles=max — runs as fast as the
# host CPU allows, ~4-8x faster than a real PODP83.
#
# Use this config for: debugging logic / UI / crash bugs where you just want
# to reach the repro state quickly. DO NOT use for performance judgments —
# audio dropouts, framerate claims, Organya timing validation all require
# the parity config (tools/dosbox-x.conf).

[sdl]
fullscreen = false
output     = surface

[dosbox]
machine    = svga_s3
memsize    = 48
quit warning = false

[cpu]
cputype    = pentium_slow
# Dynamic core is fine here — we don't care about timing fidelity, just speed.
core       = dynamic
# `max` = flat out, no cycle limit. DOSBox-X will burn host CPU.
cycles     = max

[sblaster]
sbtype     = sb16
sbbase     = 220
irq        = 5
dma        = 1
hdma       = 5
oplmode    = none

[vesa]
modelist   = compatible

[dos]
xms        = true
ems        = true
umb        = true
# Force LFN on (DOSBox-X default `auto` disables LFN under MS-DOS 6.22).
# NXEngine's data tree has long filenames (wavetable.dat, music_dirs.json,
# StageSelect.tsc) that won't open under 8.3 — engine fatal-exits without
# this. Mirrors tools/dosbox-x.conf; see comment there for the real-HW
# Phase 8 LFN strategy caveat.
lfn        = true

[render]
aspect     = false
scaler     = none

[autoexec]
# Launchers inject mount + exe via -c flags so this config stays
# invocation-agnostic for those code paths.
#
# The single SET below is defense-in-depth for direct
# `dosbox-x -conf tools/dosbox-x-fast.conf` invocations that bypass the
# launchers — DOSBox-X's emulated SB16 returns 0xFF on the DSP detection read
# regardless of timing tuning, so SDL3-DOS audio init fails without it. See
# patches/SDL/0001-sb16-dsp-detection-fix.patch fix #4 (DOSBox-X escape hatch).
# Real hardware (g2k Phase 8) MUST NOT set this — strip if reusing for HW.
SET SDL_DOS_AUDIO_SB_SKIP_DETECTION=1
